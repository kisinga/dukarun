name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # required for upload-artifact finalization
      contents: read
    env:
      HUSKY: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install and test backend
        run: |
          npm ci
          npm run build -w @dukarun/backend
          npm run test:coverage -w @dukarun/backend
        timeout-minutes: 10

      - name: Upload backend coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ./backend/coverage/
          if-no-files-found: error
          retention-days: 14

  test-frontend:
    runs-on: ubuntu-22.04
    permissions:
      actions: write  # required for upload-artifact finalization
      contents: read
    env:
      HUSKY: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Google Chrome
        run: |
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update
          sudo apt-get install -y /tmp/google-chrome-stable_current_amd64.deb

      - name: Install dependencies
        run: npm ci

      - name: Production build (catches budget errors)
        run: npm run build -w @dukarun/frontend -- --configuration production

      - name: Run frontend tests
        run: |
          export CHROME_BIN=/usr/bin/google-chrome-stable
          npm run test:ci -w @dukarun/frontend
        timeout-minutes: 10

      - name: Upload frontend coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend/coverage/
          if-no-files-found: error
          retention-days: 14

  coverage-combined:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()
    permissions:
      actions: read   # required for download-artifact
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: ./backend/coverage
        continue-on-error: true

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend/coverage
        continue-on-error: true

      - name: Check for coverage files
        run: |
          echo "Checking for coverage files..."
          if [ -f "./backend/coverage/lcov.info" ]; then
            echo "✅ Backend coverage found"
          else
            echo "❌ Backend coverage not found"
          fi
          if [ -f "./frontend/coverage/lcov.info" ]; then
            echo "✅ Frontend coverage found"
          else
            echo "❌ Frontend coverage not found"
          fi

      - name: Summarize coverage
        run: node scripts/coverage-summary.mjs --markdown "$GITHUB_STEP_SUMMARY" --badge badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test-backend.result == 'success' && needs.test-frontend.result == 'success'
        run: |
          if git diff --quiet -- badges/coverage.svg; then
            echo "Coverage badge is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git commit -m "chore: update coverage badge"
          git push
