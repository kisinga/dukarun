name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # required for upload-artifact finalization
      contents: read
    env:
      HUSKY: 0
      onnxruntime-node-install-cuda: skip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install and test backend
        run: |
          npm ci
          npm run build -w @dukarun/backend
          npm run test:coverage -w @dukarun/backend
        timeout-minutes: 10
        env:
          onnxruntime-node-install-cuda: skip

      - name: Upload backend coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ./backend/coverage/
          if-no-files-found: error
          retention-days: 14

  test-frontend:
    runs-on: ubuntu-22.04
    permissions:
      actions: write  # required for upload-artifact finalization
      contents: read
    env:
      HUSKY: 0
      onnxruntime-node-install-cuda: skip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Google Chrome
        run: |
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update
          sudo apt-get install -y /tmp/google-chrome-stable_current_amd64.deb

      - name: Install dependencies
        run: npm ci
        env:
          onnxruntime-node-install-cuda: skip

      - name: Enforce frontend layer boundaries
        run: npm run boundary-check -w @dukarun/frontend

      - name: Enforce design language (The Counter)
        run: npm run design-guard -w @dukarun/frontend

      - name: Production build (catches budget errors)
        run: npm run build -w @dukarun/frontend -- --configuration production

      - name: Run frontend tests
        run: |
          export CHROME_BIN=/usr/bin/google-chrome-stable
          npm run test:ci -w @dukarun/frontend
        timeout-minutes: 10

      - name: Upload frontend coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend/coverage/
          if-no-files-found: error
          retention-days: 14

  coverage-combined:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()
    permissions:
      actions: read   # required for download-artifact
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: ./backend/coverage
        continue-on-error: true

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend/coverage
        continue-on-error: true

      - name: Check for coverage files
        run: |
          echo "Checking for coverage files..."
          if [ -f "./backend/coverage/lcov.info" ]; then
            echo "✅ Backend coverage found"
          else
            echo "❌ Backend coverage not found"
          fi
          if [ -f "./frontend/coverage/lcov.info" ]; then
            echo "✅ Frontend coverage found"
          else
            echo "❌ Frontend coverage not found"
          fi

      - name: Summarize coverage
        run: node scripts/coverage-summary.mjs --markdown "$GITHUB_STEP_SUMMARY" --badge-dir badges

      - name: Open coverage badges pull request
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test-backend.result == 'success' && needs.test-frontend.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- badges)" ]; then
            echo "Coverage badge is already up to date."
            exit 0
          fi

          branch="automation/update-coverage-badges"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" 2>/dev/null || true
          git switch -c "$branch"
          git add badges
          git commit -m "chore: update coverage badges"
          git push --force-with-lease origin "$branch"

          body="Updates the repository-owned backend, frontend, and combined coverage badges from the latest successful main run."
          pr_number="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "chore: update coverage badges" --body "$body"
          else
            gh pr create --base main --head "$branch" --title "chore: update coverage badges" --body "$body"
            pr_number="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')"
          fi

          if [ -n "$pr_number" ]; then
            gh pr merge "$pr_number" --squash --auto --delete-branch || {
              echo "Coverage badge PR #$pr_number was created, but auto-merge is not available."
              echo "Review and merge it manually to update README badges."
            }
          fi
