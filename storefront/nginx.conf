# Storefront Nginx (template: BACKEND_HOST, BACKEND_PORT substituted at container start).
# Static CSR app served for every merchant subdomain; shop-api + product assets + SEO endpoints
# are proxied to the backend with the original Host preserved so the backend resolves the merchant.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;

resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

server {
  listen 4202 default_server;
  server_name _;

  server_tokens off;
  client_max_body_size 2M;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /health {
    access_log off;
    return 200 "OK\n";
    add_header Content-Type text/plain;
  }

  # Backend shop-api, per-merchant SEO endpoints, and Vendure product assets.
  # Host is preserved so the backend maps the subdomain -> channel for sitemap/robots.
  location ~ ^/(shop-api|sitemap\.xml|robots\.txt|assets)(/.*)?$ {
    limit_req zone=api_limit burst=40 nodelay;
    set $backend_upstream http://${BACKEND_HOST}:${BACKEND_PORT};
    proxy_pass $backend_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;
  }

  # SPA: client-rendered; all unknown paths fall back to the app shell.
  location / {
    limit_req zone=app_limit burst=20 nodelay;
    try_files $uri $uri/ /index.html;
    location ~ \.html$ {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
      add_header Expires "0";
    }
  }

  location ~* \.(js|mjs|css)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
