<app-page-header title="Reconciliation" subtitle="Repair divergences between operational models and the ledger." class="mb-6" />

<div class="flex flex-wrap items-end gap-4 p-4 rounded-xl border border-base-300 bg-base-100 shadow mb-6">
  <label class="form-control w-56">
    <span class="label"><span class="label-text">Channel</span></span>
    <select class="select select-bordered select-sm" [ngModel]="selectedChannelToken()" (ngModelChange)="onChannelChange($event)">
      @for (ch of channels(); track ch.id) {
        <option [value]="ch.token">{{ ch.code }}</option>
      }
    </select>
  </label>
</div>

<div role="tablist" class="tabs tabs-bordered mb-6">
  <button type="button" role="tab" class="tab" [class.tab-active]="activeTab() === 'orders'" (click)="setTab('orders')">
    Orders
  </button>
  <button type="button" role="tab" class="tab" [class.tab-active]="activeTab() === 'inventory'" (click)="setTab('inventory')">
    Inventory
  </button>
</div>

@if (activeTab() === 'orders') {
  <div class="flex flex-wrap items-end gap-4 p-4 rounded-xl border border-base-300 bg-base-100 shadow mb-6">
    <label class="form-control w-40">
      <span class="label"><span class="label-text">Tolerance (cents)</span></span>
      <input type="number" class="input input-bordered input-sm" [ngModel]="toleranceCents()" (ngModelChange)="toleranceCents.set($event)" min="0" />
    </label>
    <button type="button" class="btn btn-primary btn-sm" (click)="loadOrders()">Refresh</button>
  </div>

  <app-divergence-table
    [loading]="loading()"
    [error]="error()"
    [items]="items()"
    [columns]="orderColumns"
    emptyMessage="No divergent orders found within the tolerance."
    [countLabel]="totalItems() + ' divergent order(s)'"
    [trackBy]="orderTrackBy"
    (reconcile)="openReconcile($event)"
  />
}

@if (activeTab() === 'inventory') {
  <div class="flex flex-wrap items-end gap-4 p-4 rounded-xl border border-base-300 bg-base-100 shadow mb-6">
    <label class="form-control w-40">
      <span class="label"><span class="label-text">Tolerance (cents)</span></span>
      <input type="number" class="input input-bordered input-sm" [ngModel]="inventoryToleranceCents()" (ngModelChange)="inventoryToleranceCents.set($event)" min="0" />
    </label>
    <button type="button" class="btn btn-primary btn-sm" (click)="loadInventory()">Refresh</button>
  </div>

  <app-divergence-table
    [loading]="inventoryLoading()"
    [error]="inventoryError()"
    [items]="inventoryItems()"
    [columns]="inventoryColumns"
    emptyMessage="Inventory valuation is in sync with the ledger."
    [countLabel]="inventoryItems().length + ' inventory divergence(s)'"
    [trackBy]="inventoryTrackBy"
    (reconcile)="openInventoryReconcile($event)"
  />
}

@if (selectedOrder(); as order) {
  <app-reconcile-modal
    [title]="'Reconcile ' + order.orderCode"
    [detail]="'Order model: ' + formatMoney(order.orderModelOwing) + ' · Ledger: ' + formatMoney(order.ledgerOwing)"
    [reason]="note()"
    [confirming]="reconciling()"
    [error]="reconcileError()"
    [success]="reconcileSuccess()"
    (reasonChange)="note.set($event)"
    (confirm)="confirmReconcile()"
    (cancel)="closeReconcile()"
  >
    <div extraFields>
      <label class="form-control w-full">
        <span class="label"><span class="label-text">Strategy</span></span>
        <select class="select select-bordered select-sm w-full" [ngModel]="strategy()" (ngModelChange)="strategy.set($event)">
          @for (s of strategies; track s.value) {
            <option [value]="s.value">{{ s.label }}</option>
          }
        </select>
      </label>
    </div>
  </app-reconcile-modal>
}

@if (selectedInventory(); as item) {
  <app-reconcile-modal
    title="Reconcile inventory"
    [detail]="'Batch valuation: ' + formatMoney(item.entityValue) + ' · Ledger: ' + formatMoney(item.ledgerValue) + ' · Difference: ' + formatMoney(item.difference)"
    [reason]="inventoryReason()"
    [confirming]="inventoryReconciling()"
    [error]="inventoryReconcileError()"
    [success]="inventoryReconcileSuccess()"
    (reasonChange)="inventoryReason.set($event)"
    (confirm)="confirmInventoryReconcile()"
    (cancel)="closeInventoryReconcile()"
  >
    <p extraFields class="text-sm text-base-content/70">
      This posts a ledger adjustment so the INVENTORY account matches the batch valuation.
    </p>
  </app-reconcile-modal>
}
