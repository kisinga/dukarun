<!-- Date -->
<td>
  <div class="text-sm">{{ purchase().purchaseDate | date: 'shortDate' }}</div>
</td>

<!-- Supplier -->
<td>
  <div class="font-semibold">{{ getSupplierName() }}</div>
</td>

<!-- Reference -->
<td>
  <span class="text-sm text-base-content/70">
    {{ purchase().referenceNumber || '—' }}
  </span>
</td>

<!-- Total Cost -->
<td>
  <span class="font-mono text-sm font-semibold">{{ formatCurrency(purchase().totalCost) }}</span>
</td>

<!-- Payment Status -->
<td>
  <span class="badge badge-sm" [ngClass]="getPaymentStatusBadgeClass()">
    {{ purchase().paymentStatus }}
  </span>
  @if (purchase().isCreditPurchase) {
    <span class="badge badge-xs badge-info ml-1">Credit</span>
  }
</td>

<!-- Actions -->
<td class="text-right">
  <div class="flex justify-end gap-1">
    <button (click)="onAction('view', $event)" class="btn btn-ghost btn-xs" title="View Details">
      <ng-icon name="heroEye" size="1rem" />
    </button>
    @if (canPay()) {
      <button (click)="onAction('pay', $event)" class="btn btn-success btn-xs" title="Pay">
        Pay
      </button>
    }
    <button (click)="onAction('edit', $event)" class="btn btn-ghost btn-xs" title="Edit">
      <ng-icon name="heroPencilSquare" size="1rem" />
    </button>
    <button
      (click)="onAction('delete', $event)"
      class="btn btn-error btn-ghost btn-xs"
      title="Delete"
    >
      <ng-icon name="heroTrash" size="1rem" />
    </button>
  </div>
</td>
