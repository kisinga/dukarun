<app-stat-strip [cols]="4">
  <app-stat-card
    label="Total Debits"
    [value]="formatCurrency()(stats().totalDebits)"
    tone="success"
    icon="heroArrowTrendingUp"
  />
  <app-stat-card
    label="Total Credits"
    [value]="formatCurrency()(stats().totalCredits)"
    tone="error"
    icon="heroArrowTrendingDown"
  />
  <app-stat-card
    label="Net Balance"
    [value]="formatCurrency()(stats().netBalance)"
    [tone]="netBalanceTone()"
    icon="heroScale"
  />
  <app-stat-card
    label="Transactions"
    [value]="stats().transactionCount"
    icon="heroClipboardDocumentList"
  />
</app-stat-strip>
