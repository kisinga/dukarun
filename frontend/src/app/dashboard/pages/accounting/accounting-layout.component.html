<div class="space-y-5 lg:space-y-6 anim-stagger">
  <div class="flex items-start justify-between gap-4">
    <div class="flex-1 min-w-0">
      <h1 class="text-2xl lg:text-3xl font-bold tracking-tight">Accounting</h1>
      <p class="text-sm text-base-content/60 mt-1">Overview, activity, accounts and expenses</p>
    </div>
  </div>

  <div class="bg-base-200 rounded-lg overflow-x-auto p-1">
    <div role="tablist" class="tabs tabs-box">
      @for (tab of tabs; track tab.activeKey) {
        <a
          [routerLink]="tab.link"
          [queryParams]="tab.queryParams ?? {}"
          class="tab gap-1.5"
          [class.tab-active]="tab.activeKey === activeKey()"
          [attr.aria-label]="tab.label"
          [attr.aria-current]="tab.activeKey === activeKey() ? 'page' : null"
        >
          <ng-icon [name]="tab.icon" size="1rem" />
          <span>{{ tab.label }}</span>
        </a>
      }
    </div>
  </div>

  <div class="mt-3">
    <router-outlet />
  </div>
</div>
