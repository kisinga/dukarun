<div class="space-y-4 sm:space-y-5 lg:space-y-6 anim-stagger">
  <app-page-header
    title="Accounting"
    subtitle="Overview, activity, accounts and expenses"
    [showRefresh]="canRefresh()"
    [isLoading]="viewLoading()"
    (refresh)="refreshView()"
  >
    @if (headerStats().length > 0) {
      <app-stat-bar header-stats [stats]="headerStats()" />
    }
  </app-page-header>

  <div class="overflow-x-auto">
    <div role="tablist" class="tabs tabs-box bg-base-200 w-fit">
      @for (tab of tabs; track tab.activeKey) {
        <a
          [routerLink]="tab.link"
          [queryParams]="tab.queryParams ?? {}"
          class="tab gap-1.5"
          [class.tab-active]="tab.activeKey === activeKey()"
          [attr.aria-label]="tab.label"
          [attr.aria-current]="tab.activeKey === activeKey() ? 'page' : null"
        >
          <ng-icon [name]="tab.icon" size="1rem" />
          <span>{{ tab.label }}</span>
        </a>
      }
    </div>
  </div>

  <router-outlet (activate)="onActivate($event)" (deactivate)="onDeactivate()" />
</div>
