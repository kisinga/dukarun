<!-- Supplier Card (Mobile) -->
<div class="card bg-base-100 border border-base-300 mb-4 shadow-sm">
  <div class="card-body p-5">
    <!-- Header -->
    <div class="flex items-start justify-between mb-3">
      <div class="flex items-center gap-3">
        <app-entity-avatar
          [firstName]="supplier().firstName"
          [lastName]="supplier().lastName"
          size="lg"
        />

        <!-- Supplier Info -->
        <div class="flex-1 min-w-0">
          <h3 class="font-semibold text-base truncate">{{ getFullName() }}</h3>
          <p class="text-sm text-base-content/70 truncate">{{ supplier().emailAddress }}</p>
          @if (supplier().phoneNumber) {
            <p class="text-xs text-base-content/60">{{ supplier().phoneNumber }}</p>
          }
        </div>
      </div>

      @if (isVerified()) {
        <app-status-badge type="success" label="Verified" [showIcon]="true" />
      }
    </div>

    <!-- Quick Supplier Type -->
    @if (getSupplierType() && getSupplierType() !== 'General') {
      <div class="mb-3 p-3 bg-base-200 rounded-lg">
        <div class="flex items-center justify-between">
          <span class="text-xs font-medium text-base-content/70">Type</span>
          <span class="text-sm font-semibold text-base-content">{{ getSupplierType() }}</span>
        </div>
      </div>
    }

    <!-- Actions -->
    <div class="flex gap-2 mt-1">
      <button class="btn btn-sm btn-primary flex-1" (click)="onAction('view')">
        <ng-icon name="heroEye" size="1rem" />
        View Details
      </button>

      <button class="btn btn-sm btn-outline" (click)="onAction('edit')">
        <ng-icon name="heroPencilSquare" size="1rem" />
      </button>
    </div>
  </div>
</div>
