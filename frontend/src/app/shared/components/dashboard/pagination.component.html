<div class="border-t border-base-300/70 pt-3">
  <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
    <div class="flex flex-wrap items-center justify-center gap-x-3 gap-y-2 lg:justify-start">
      <span class="text-sm text-base-content/60">
        <span class="font-semibold text-base-content">{{ startItem() }}-{{ endItem() }}</span>
        of
        <span class="font-semibold text-base-content">{{ totalItems() }}</span>
        {{ itemLabel() }}
      </span>

      @if (showItemsPerPage()) {
        <span class="hidden h-4 w-px bg-base-300 sm:inline-block"></span>
        <label class="flex items-center gap-2 text-sm text-base-content/60">
          <span>Show</span>
          <select
            [value]="itemsPerPage()"
            (change)="onItemsPerPageSelect($event)"
            class="select select-bordered select-xs h-8 min-h-8 w-20"
          >
            @for (option of pageOptions(); track option) {
              <option [value]="option">{{ option }}</option>
            }
          </select>
        </label>
      }
    </div>

    <div
      class="flex flex-col-reverse gap-3 sm:flex-row sm:items-center sm:justify-center lg:justify-end"
    >
      <div class="flex items-center justify-center gap-2">
        <div class="join">
          <button
            class="join-item btn btn-sm btn-square"
            [disabled]="currentPage() === 1"
            (click)="onPageChange(1)"
            aria-label="First page"
            title="First page"
          >
            <ng-icon name="heroChevronDoubleLeft" size="1rem" />
          </button>
          <button
            class="join-item btn btn-sm btn-square"
            [disabled]="currentPage() === 1"
            (click)="onPageChange(currentPage() - 1)"
            aria-label="Previous page"
            title="Previous page"
          >
            <ng-icon name="heroChevronLeft" size="1rem" />
          </button>
        </div>

        <div class="join hidden sm:flex">
          @for (page of pageNumbers(); track page) {
            <button
              class="join-item btn btn-sm min-w-9"
              [class.btn-active]="page === currentPage()"
              (click)="onPageChange(page)"
              [attr.aria-current]="page === currentPage() ? 'page' : null"
            >
              {{ page }}
            </button>
          }
        </div>

        <div class="badge badge-lg badge-primary sm:hidden font-bold px-4">
          {{ currentPage() }}
        </div>

        <div class="join">
          <button
            class="join-item btn btn-sm btn-square"
            [disabled]="currentPage() === totalPages()"
            (click)="onPageChange(currentPage() + 1)"
            aria-label="Next page"
            title="Next page"
          >
            <ng-icon name="heroChevronRight" size="1rem" />
          </button>
          <button
            class="join-item btn btn-sm btn-square"
            [disabled]="currentPage() === totalPages()"
            (click)="onPageChange(totalPages())"
            aria-label="Last page"
            title="Last page"
          >
            <ng-icon name="heroChevronDoubleRight" size="1rem" />
          </button>
        </div>
      </div>

      <div class="flex flex-wrap items-center justify-center gap-2 sm:justify-end">
        <ng-content select="[pagination-actions]"></ng-content>
      </div>
    </div>
  </div>
</div>
